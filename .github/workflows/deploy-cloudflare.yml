name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Build and deploy Cloudflare worker
        run: bun run cf:deploy

      - name: Redirect legacy Pages domain to the worker
        run: |
          PAGES_PRODUCTION_BRANCH=$(bunx wrangler pages project list --json | jq -r '.[] | select(.name == "imobiliare2") | .production_branch')
          test -n "$PAGES_PRODUCTION_BRANCH"
          bunx wrangler pages deploy legacy-pages-redirect --project-name=imobiliare2 --branch="$PAGES_PRODUCTION_BRANCH"
