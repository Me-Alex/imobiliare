name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: file:../db/custom.db
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_ci_placeholder
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Lint and type-check
        run: bun run lint && bun run typecheck

      - name: Build Cloudflare worker
        run: bun run cf:build

  deploy:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Build and deploy Cloudflare worker
        run: bun run cf:deploy

      - name: Redirect legacy Pages domain to the worker
        run: |
          PAGES_PRODUCTION_BRANCH=$(curl --fail --silent --show-error \
            --header "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/imobiliare2" \
            | jq -er '.result.production_branch')
          bunx wrangler pages deploy legacy-pages-redirect --project-name=imobiliare2 --branch="$PAGES_PRODUCTION_BRANCH"

      - name: Smoke test production worker
        run: |
          for attempt in $(seq 1 6); do
            if curl --fail --silent --show-error "https://hqs-imobiliare.floreaalexandru2002.workers.dev/proprietati" > /dev/null; then
              exit 0
            fi
            sleep 10
          done
          exit 1
